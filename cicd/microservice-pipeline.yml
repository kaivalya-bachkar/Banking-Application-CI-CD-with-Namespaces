trigger: none

pool:
  name: 'Default'

parameters:
  - name: serviceName
    displayName: 'Select Microservice to Deploy'
    type: string
    default: 'user-service'
    values:
      - user-service
      - account-service
      - transaction-service
      - notification-service
      - frontend-service

  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - uat
      - prod

variables:
  - name: azureServiceConnection
    value: 'Banking-App-Service-Connection' 
  - name: acrName
    value: 'bankingappregistrydev' 
  - name: aksResourceGroup
    value: 'Banking_Application_Dev'
  - name: aksName
    value: 'banking-app-aks-dev'
  - name: dbHost
    value: 'bankingdev-psqlflexibleserver.postgres.database.azure.com'
    
  - name: serviceName
    value: ${{ parameters.serviceName }}

  - ${{ if eq(parameters.environment, 'dev') }}:
    - name: namespace
      value: 'dev'
    - name: dbName
      value: 'banking_db_dev'
    - name: domainName
      value: 'www.globalbankdev.local'

  - ${{ if eq(parameters.environment, 'qa') }}:
    - name: namespace
      value: 'qa'
    - name: sourceNamespace
      value: 'dev'
    - name: dbName
      value: 'banking_db_qa'
    - name: domainName
      value: 'www.globalbankqa.local'

  - ${{ if eq(parameters.environment, 'uat') }}:
    - name: namespace
      value: 'uat'
    - name: sourceNamespace
      value: 'qa'
    - name: dbName
      value: 'banking_db_uat'
    - name: domainName
      value: 'www.globalbankuat.local'

  - ${{ if eq(parameters.environment, 'prod') }}:
    - name: namespace
      value: 'prod'
    - name: sourceNamespace
      value: 'uat'
    - name: dbName
      value: 'banking_db_prod'
    - name: domainName
      value: 'www.globalbankprod.local'

stages:
- stage: BuildAndDeploy
  displayName: 'Deploy ${{ parameters.serviceName }} to ${{ parameters.environment }}'
  jobs:
  - job: BuildPushDeploy
    steps:
    - bash: |
        SHORT_HASH=${BUILD_SOURCEVERSION:0:8}
        echo "Git Commit: $BUILD_SOURCEVERSION"
        echo "Short Hash: $SHORT_HASH"
        echo "##vso[task.setvariable variable=tag]$SHORT_HASH"
      displayName: 'Set Image Tag to Short Commit Hash'
      
    - task: AzureCLI@2
      displayName: 'Build/Promote, Push, and Deploy'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e 
          
          PREFIX=$(echo "$(serviceName)" | sed 's/-service//')
          
          echo "======================================================="
          echo " DEPLOYING: $(serviceName)"
          echo " TARGET NAMESPACE: $(namespace)"
          echo " TARGET DOMAIN: $(domainName)"
          echo " SHARED ACR: $(acrName)"
          echo "======================================================="
          
          echo "--- 0. Ensuring Namespace Exists ---"
          az aks command invoke \
            --resource-group $(aksResourceGroup) \
            --name $(aksName) \
            --command "kubectl create namespace $(namespace) --dry-run=client -o yaml | kubectl apply -f -"
          
          echo "--- 1. Handling Image for $(namespace) ---"
          cd src/$(serviceName)
          az acr login --name $(acrName)
          
          if [ "${{ parameters.environment }}" == "dev" ]; then
            echo "Environment is DEV. Building a fresh image from source code..."
            docker build -t $(acrName).azurecr.io/$(namespace)/$(serviceName):$(tag) .
            docker push $(acrName).azurecr.io/$(namespace)/$(serviceName):$(tag)
          else
            echo "Environment is ${{ parameters.environment }}. Promoting tested image from $(sourceNamespace)..."
            docker pull $(acrName).azurecr.io/$(sourceNamespace)/$(serviceName):$(tag)
            
            echo "Retagging and pushing image to $(namespace) folder..."
            docker tag $(acrName).azurecr.io/$(sourceNamespace)/$(serviceName):$(tag) $(acrName).azurecr.io/$(namespace)/$(serviceName):$(tag)
            docker push $(acrName).azurecr.io/$(namespace)/$(serviceName):$(tag)
          fi
          
          echo "--- 2. Injecting Variables into Manifests ---"
          cd ../../ 
          
          sed -i "s|__IMAGE__|$(acrName).azurecr.io/$(namespace)/$(serviceName):$(tag)|g" kube/$(serviceName)/${PREFIX}-deployment.yaml
          sed -i "s|__DB_HOST__|$(dbHost)|g" kube/$(serviceName)/${PREFIX}-deployment.yaml
          sed -i "s|__DB_PASSWORD__|$(dbPassword)|g" kube/$(serviceName)/${PREFIX}-deployment.yaml
          sed -i "s|__DB_NAME__|$(dbName)|g" kube/$(serviceName)/${PREFIX}-deployment.yaml
          
          # FRONTEND ONLY: Inject Domain and Generate TLS
          if [ "$(serviceName)" == "frontend-service" ]; then
            echo "Frontend Selected: Injecting Ingress Domain..."
            sed -i "s|__DOMAIN_NAME__|$(domainName)|g" kube/$(serviceName)/ingress.yaml
            
            echo "--- 3. Automating TLS Certificate Generation ---"
            openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
              -out globalbank-tls.crt \
              -keyout globalbank-tls.key \
              -subj "/CN=$(domainName)/O=Global Bank"
              
            echo "Injecting TLS Secret into AKS Namespace: $(namespace)..."
            az aks command invoke \
              --resource-group $(aksResourceGroup) \
              --name $(aksName) \
              --command "kubectl create secret tls globalbank-tls-secret --key globalbank-tls.key --cert globalbank-tls.crt -n $(namespace) --dry-run=client -o yaml | kubectl apply -f -" \
              --file globalbank-tls.key \
              --file globalbank-tls.crt
          fi
          
          echo "--- 4. Deploying to $(aksName) via AKS Run Command ---"
          
          echo "Applying Deployment..."
          az aks command invoke \
            --resource-group $(aksResourceGroup) \
            --name $(aksName) \
            --command "kubectl apply -f ${PREFIX}-deployment.yaml -n $(namespace)" \
            --file kube/$(serviceName)/${PREFIX}-deployment.yaml
            
          echo "Applying Service..."
          az aks command invoke \
            --resource-group $(aksResourceGroup) \
            --name $(aksName) \
            --command "kubectl apply -f ${PREFIX}-service.yaml -n $(namespace)" \
            --file kube/$(serviceName)/${PREFIX}-service.yaml
            
          # FRONTEND ONLY: Deploy Ingress and Reboot AGIC
          if [ "$(serviceName)" == "frontend-service" ]; then
            echo "Frontend Selected: Resetting AGIC Pod to fetch fresh routing rules..."
            az aks command invoke \
              --resource-group $(aksResourceGroup) \
              --name $(aksName) \
              --command "kubectl delete pod -n kube-system -l app=ingress-appgw"
              
            echo "Waiting 20 seconds for AGIC to reboot..."
            sleep 20
              
            echo "Applying Ingress..."
            az aks command invoke \
              --resource-group $(aksResourceGroup) \
              --name $(aksName) \
              --command "kubectl apply -f ingress.yaml -n $(namespace)" \
              --file kube/$(serviceName)/ingress.yaml
          fi

    - task: CmdLine@2
      displayName: 'Cleanup Local Disk Space'
      condition: always()
      inputs:
        script: |
          docker rmi $(acrName).azurecr.io/$(namespace)/$(serviceName):$(tag) || true
          if [ "$(sourceNamespace)" != "" ]; then
            docker rmi $(acrName).azurecr.io/$(sourceNamespace)/$(serviceName):$(tag) || true
          fi